<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign Up · Smart Registration Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e9f0fc 0%, #d9e4f5 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* modern card container */
    .form-card {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .form-card:hover {
      transform: translateY(-3px);
    }

    /* header */
    .form-header {
      background: #1e2a47;
      padding: 1.8rem 2rem;
      text-align: center;
    }

    .form-header h1 {
      color: white;
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
    }

    .form-header p {
      color: #bfd9ff;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    /* main form area */
    .form-body {
      padding: 2rem 2rem 2rem 2rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      color: #1f2a44;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    label i {
      font-style: normal;
      font-weight: 500;
    }

    input {
      padding: 0.85rem 1rem;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 1rem;
      background-color: #ffffff;
      transition: all 0.2s ease;
      font-family: inherit;
      outline: none;
      color: #0f172a;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    /* error styling */
    input.input-error {
      border-color: #e53e3e;
      background-color: #fff8f8;
    }

    .error-message {
      color: #e53e3e;
      font-size: 0.75rem;
      margin-top: 0.4rem;
      margin-left: 0.5rem;
      display: none;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    /* success message */
    .success-banner {
      background-color: #10b981;
      color: white;
      text-align: center;
      padding: 0.9rem;
      border-radius: 2rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: none;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(2px);
    }

    /* submit button */
    .submit-btn {
      width: 100%;
      background: #1e2a47;
      color: white;
      border: none;
      padding: 0.9rem;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.8rem;
      font-family: inherit;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .submit-btn:hover {
      background: #0f2b3f;
      transform: scale(0.98);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    /* hint text */
    .hint-text {
      font-size: 0.7rem;
      color: #5b6e8c;
      margin-top: 0.3rem;
      margin-left: 0.5rem;
    }

    hr {
      margin: 1rem 0 0.5rem;
      border: none;
      border-top: 1px solid #eef2f8;
    }

    @media (max-width: 480px) {
      .form-body {
        padding: 1.5rem;
      }
      .form-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

<div class="form-card">
  <div class="form-header">
    <h1>Create account</h1>
    <p>Join our community — it takes seconds</p>
  </div>

  <div class="form-body">
    <!-- success message element (hidden by default) -->
    <div id="successMessage" class="success-banner">
      ✅ Registration successful! Welcome aboard.
    </div>

    <form id="registrationForm" novalidate>
      <!-- Username field -->
      <div class="input-group">
        <label>👤 Username</label>
        <input type="text" id="username" name="username" placeholder="e.g., johndoe123" autocomplete="off">
        <div id="usernameError" class="error-message"></div>
        <div class="hint-text">Minimum 5 characters</div>
      </div>

      <!-- Email field -->
      <div class="input-group">
        <label>📧 Email address</label>
        <input type="email" id="email" name="email" placeholder="hello@example.com" autocomplete="off">
        <div id="emailError" class="error-message"></div>
        <div class="hint-text">Valid email like name@domain.com</div>
      </div>

      <!-- Password field -->
      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="password" name="password" placeholder="Create a strong password">
        <div id="passwordError" class="error-message"></div>
        <div class="hint-text">At least 8 characters & include 1 number</div>
      </div>

      <!-- Confirm password field -->
      <div class="input-group">
        <label>✓ Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Retype password">
        <div id="confirmPasswordError" class="error-message"></div>
        <div class="hint-text">Must match your password</div>
      </div>

      <button type="submit" class="submit-btn">Sign up →</button>
    </form>
    <hr />
    <div style="font-size: 0.7rem; text-align: center; color: #6c7a91;">All fields are required — real-time validation</div>
  </div>
</div>

<script>
  // Wait for the DOM to load
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('registrationForm');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');

    // Error message elements
    const usernameError = document.getElementById('usernameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');

    // Helper functions to show/hide errors
    function showError(input, errorElement, message) {
      input.classList.add('input-error');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
    }

    function hideError(input, errorElement) {
      input.classList.remove('input-error');
      errorElement.style.display = 'none';
    }

    // Validation functions
    function validateUsername() {
      const value = username.value.trim();
      if (value.length < 5) {
        showError(username, usernameError, '❌ Username must be at least 5 characters long');
        return false;
      } else {
        hideError(username, usernameError);
        return true;
      }
    }

    function validateEmail() {
      const value = email.value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(value)) {
        showError(email, emailError, '❌ Please enter a valid email address (e.g., name@domain.com)');
        return false;
      } else {
        hideError(email, emailError);
        return true;
      }
    }

    function validatePassword() {
      const value = password.value;
      const hasNumber = /\d/.test(value);

      if (value.length < 8) {
        showError(password, passwordError, '❌ Password must be at least 8 characters long');
        return false;
      } else if (!hasNumber) {
        showError(password, passwordError, '❌ Password must include at least one number (0-9)');
        return false;
      } else {
        hideError(password, passwordError);
        return true;
      }
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;
      const passwordValue = password.value;

      if (value !== passwordValue) {
        showError(confirmPassword, confirmPasswordError, '❌ Passwords do not match');
        return false;
      } else {
        hideError(confirmPassword, confirmPasswordError);
        return true;
      }
    }

    // Real-time validation
    username.addEventListener('input', validateUsername);
    email.addEventListener('input', validateEmail);
    
    password.addEventListener('input', function() {
      validatePassword();
      // Also validate confirm password when password changes, but only if confirm field has some content
      // (so that we don't show mismatch error prematurely when confirm is empty)
      if (confirmPassword.value.trim() !== '') {
        validateConfirmPassword();
      } else {
        // if confirm is empty, just ensure any previous error is hidden? 
        // But we only hide if confirm empty? Actually we should clear error when confirm is empty
        // because mismatch only makes sense if both fields have content. However we can just reset error.
        // Let's do: hide confirm error when password changes and confirm field empty to avoid misleading.
        if (confirmPassword.value === '') {
          hideError(confirmPassword, confirmPasswordError);
        } else {
          validateConfirmPassword();
        }
      }
    });
    
    confirmPassword.addEventListener('input', function() {
      // If password itself is empty, we show mismatch? better to check only if password has value.
      // But our confirm validation already compares. Let's improve UX: only validate confirm if password has value >0
      if (password.value.length === 0 && confirmPassword.value.length > 0) {
        showError(confirmPassword, confirmPasswordError, '❌ Please enter a password first');
      } else {
        validateConfirmPassword();
      }
    });

    // Additional edge: when confirm password is being typed and password becomes valid/invalid, we revalidate
    // but we already have password change event handling it, so it's fine.

    // Form submission
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Run all validations fresh
      const isUsernameValid = validateUsername();
      const isEmailValid = validateEmail();
      const isPasswordValid = validatePassword();
      const isConfirmPasswordValid = validateConfirmPassword();

      // If all validations pass
      if (isUsernameValid && isEmailValid && isPasswordValid && isConfirmPasswordValid) {
        const successMsgDiv = document.getElementById('successMessage');
        successMsgDiv.style.display = 'block';
        
        // Optionally scroll success into view smoothly
        successMsgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        // Reset the form after successful submission
        form.reset();
        
        // Manually clear all error styles and messages after reset
        // (because reset clears input values but error classes might persist)
        username.classList.remove('input-error');
        email.classList.remove('input-error');
        password.classList.remove('input-error');
        confirmPassword.classList.remove('input-error');
        
        usernameError.style.display = 'none';
        emailError.style.display = 'none';
        passwordError.style.display = 'none';
        confirmPasswordError.style.display = 'none';
        
        // Clear any leftover text content in errors
        usernameError.textContent = '';
        emailError.textContent = '';
        passwordError.textContent = '';
        confirmPasswordError.textContent = '';
        
        // Hide success message after 3 seconds
        setTimeout(function() {
          const msgDiv = document.getElementById('successMessage');
          if (msgDiv) msgDiv.style.display = 'none';
        }, 3000);
      } else {
        // Optionally add a subtle shake effect to highlight errors? Not necessary but nice UX
        // Focus first invalid field for accessibility
        if (!isUsernameValid) {
          username.focus();
        } else if (!isEmailValid) {
          email.focus();
        } else if (!isPasswordValid) {
          password.focus();
        } else if (!isConfirmPasswordValid) {
          confirmPassword.focus();
        }
      }
    });

    // Bonus: clear confirm password error if user empties confirm field after mismatch
    confirmPassword.addEventListener('blur', function() {
      if (confirmPassword.value.trim() === '') {
        hideError(confirmPassword, confirmPasswordError);
      } else if (password.value.length > 0) {
        validateConfirmPassword();
      }
    });
    
    // Also if password is empty but confirm has text, we handle in real-time
    password.addEventListener('blur', function() {
      if (confirmPassword.value.trim() !== '') {
        validateConfirmPassword();
      }
    });
    
    // Additional improvement: trim email / username spaces on blur (aesthetic)
    username.addEventListener('blur', function() {
      // trim whitespace and update field without breaking validation
      let trimmed = username.value.trim();
      if (username.value !== trimmed) {
        username.value = trimmed;
        validateUsername(); // revalidate after trimming
      }
    });
    
    email.addEventListener('blur', function() {
      let trimmedEmail = email.value.trim();
      if (email.value !== trimmedEmail) {
        email.value = trimmedEmail;
        validateEmail();
      }
    });
  });
</script>
</body>
</html>
